name: Benchmark Koverstar (hebdo)

# Passe PageSpeed Insights automatique, dans le cloud — indépendante de toute
# machine locale. Met à jour PERF.md + scores/ et recommit dans le repo.
# Couche objective uniquement ; la notation craft reste faite par un agent.

on:
  schedule:
    - cron: "17 1 * * 1" # tous les lundis ~01:17 UTC (~08:17 en +07)
  workflow_dispatch: {} # bouton « Run workflow » dans l'onglet Actions

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  psi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Passe PageSpeed Insights
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }} # clé optionnelle (sinon 429 géré)
        run: node run-benchmark.mjs

      - name: Commit des résultats
        run: |
          git config user.name "koverstar-benchmark-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PERF.md scores
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore(benchmark): passe $(date -u +%F)"
            git push
          fi
